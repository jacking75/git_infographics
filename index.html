<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Git 조작 방법 인포그래픽</title>

  <!-- 파비콘 -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>

  <style>
    /* ─── Reset & Base ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --git-red   : #F05032;
      --git-dark  : #2b2b2b;
      --git-mid   : #3d3d3d;
      --git-light : #f5f5f5;
      --git-accent: #ff7b54;
      --radius    : 10px;
      --shadow    : 0 4px 18px rgba(0,0,0,.18);
    }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: var(--git-dark);
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ─── Header ───────────────────────────────────────── */
    header {
      background: linear-gradient(135deg, #1a1a1a 0%, #2f0e08 50%, #1a1a1a 100%);
      border-bottom: 3px solid var(--git-red);
      padding: 32px 24px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% -20%, rgba(240,80,50,.25) 0%, transparent 70%);
      pointer-events: none;
    }

    .header-icon {
      display: inline-block;
      margin-bottom: 12px;
    }
    .header-icon svg {
      width: 64px; height: 64px;
      filter: drop-shadow(0 0 12px rgba(240,80,50,.6));
    }

    header h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
    }
    header h1 span { color: var(--git-red); }

    header p.subtitle {
      margin-top: 6px;
      font-size: .95rem;
      color: #aaa;
    }

    /* ─── Main Layout ──────────────────────────────────── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 60px;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 28px;
      align-items: start;
    }
    @media (max-width: 780px) {
      .container { grid-template-columns: 1fr; }
    }

    /* ─── Sidebar: 목록 ────────────────────────────────── */
    .sidebar {
      background: var(--git-mid);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: sticky;
      top: 20px;
    }

    .sidebar-header {
      background: var(--git-red);
      padding: 14px 20px;
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-list { list-style: none; padding: 10px; display: flex; flex-direction: column; gap: 6px; }

    .card-item {
      background: #2b2b2b;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 12px 14px;
      transition: border-color .2s, background .2s;
    }
    .card-item:hover { background: #333; border-color: var(--git-red); }
    .card-item.active { background: #3a1a14; border-color: var(--git-red); }

    .card-title {
      font-size: .97rem;
      font-weight: 600;
      color: #e8e8e8;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title .badge {
      background: var(--git-red);
      color: #fff;
      font-size: .7rem;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: 700;
      white-space: nowrap;
    }

    .card-actions { display: flex; gap: 8px; }

    .btn {
      flex: 1;
      padding: 7px 4px;
      font-size: .78rem;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background .2s, transform .1s;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .btn:active { transform: scale(.97); }

    .btn-inline {
      background: var(--git-red);
      color: #fff;
    }
    .btn-inline:hover { background: #c93e24; }

    .btn-new {
      background: #444;
      color: #e0e0e0;
      border: 1px solid #555;
    }
    .btn-new:hover { background: #555; }

    /* ─── Preview Panel ────────────────────────────────── */
    .preview-panel {
      background: var(--git-mid);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 480px;
      display: flex;
      flex-direction: column;
    }

    .preview-header {
      background: #2b2b2b;
      padding: 14px 20px;
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #888;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #3a3a3a;
    }
    .preview-header #preview-label {
      color: #e0e0e0;
      font-size: .95rem;
      letter-spacing: 0;
      font-weight: 600;
    }

    .preview-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* 빈 상태 */
    .empty-state {
      text-align: center;
      color: #555;
    }
    .empty-state svg { width: 72px; height: 72px; opacity: .3; margin-bottom: 16px; }
    .empty-state p { font-size: .95rem; }

    /* 이미지 표시 */
    #preview-img-wrap {
      display: none;
      width: 100%;
      text-align: center;
    }
    #preview-img-wrap img {
      max-width: 100%;
      max-height: 600px;
      border-radius: 8px;
      box-shadow: 0 6px 24px rgba(0,0,0,.4);
      object-fit: contain;
    }

    /* ─── Footer ───────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 20px;
      font-size: .8rem;
      color: #555;
      border-top: 1px solid #333;
    }

    /* ─── Scrollbar ────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #222; }
    ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────── -->
<header>
  <div class="header-icon">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="48" fill="#F05032"/>
      <circle cx="32" cy="68" r="10" fill="white"/>
      <circle cx="32" cy="32" r="10" fill="white"/>
      <circle cx="68" cy="44" r="10" fill="white"/>
      <line x1="32" y1="58" x2="32" y2="42" stroke="white" stroke-width="5" stroke-linecap="round"/>
      <path d="M 38 36 Q 68 36 68 44" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>
      <path d="M 38 64 Q 68 64 68 44" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>
    </svg>
  </div>
  <h1><span>Git</span> 조작 방법 인포그래픽</h1>
  <p class="subtitle">자주 쓰는 Git 작업의 단계별 해결 가이드</p>
</header>

<!-- ── Main ───────────────────────────────────────────── -->
<main>
  <div class="container">

    <!-- 사이드바 목록 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <!-- list icon -->
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
        </svg>
        가이드 목록
      </div>
      <ul class="card-list" id="card-list">
        <!-- JS로 자동 생성 -->
      </ul>
    </aside>

    <!-- 미리보기 패널 -->
    <section class="preview-panel">
      <div class="preview-header">
        <!-- eye icon -->
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
        </svg>
        미리보기 &nbsp;|&nbsp; <span id="preview-label">항목을 선택하세요</span>
      </div>
      <div class="preview-body">
        <div class="empty-state" id="empty-state">
          <!-- git branch icon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
            <circle cx="30" cy="70" r="12" fill="#555"/>
            <circle cx="30" cy="30" r="12" fill="#555"/>
            <circle cx="70" cy="50" r="12" fill="#555"/>
            <line x1="30" y1="58" x2="30" y2="42" stroke="#555" stroke-width="6" stroke-linecap="round"/>
            <path d="M 38 28 Q 70 28 70 50" fill="none" stroke="#555" stroke-width="6" stroke-linecap="round"/>
            <path d="M 38 72 Q 70 72 70 50" fill="none" stroke="#555" stroke-width="6" stroke-linecap="round"/>
          </svg>
          <p>왼쪽 목록에서 항목을 선택하면<br/>여기에 이미지가 표시됩니다.</p>
        </div>
        <div id="preview-img-wrap">
          <img id="preview-img" src="" alt=""/>
        </div>
      </div>
    </section>

  </div>
</main>

<!-- ── Footer ─────────────────────────────────────────── -->
<footer>
  Git 인포그래픽 가이드 &nbsp;|&nbsp; GitHub Pages
</footer>

<!-- ── Script ─────────────────────────────────────────── -->
<script>
  /**
   * ─── 이미지 목록 ────────────────────────────────────────
   *  새 파일 추가 시 이 배열에만 항목을 추가하면 됩니다.
   */
  const GUIDES = [
    { file: '028.jpg', title: 'Pull 충돌 5단계 해결 방법' },
    { file: '029.jpg', title: 'Push 충돌 3단계 해결법'   },
    { file: '030.jpg', title: 'Stash 안전하게 Pull 하기' },
    { file: '031.jpg', title: '로컬 제외 설정 가이드'    },
  ];

  const IMG_DIR = 'images/';

  /* ── DOM refs ── */
  const cardList      = document.getElementById('card-list');
  const emptyState    = document.getElementById('empty-state');
  const previewWrap   = document.getElementById('preview-img-wrap');
  const previewImg    = document.getElementById('preview-img');
  const previewLabel  = document.getElementById('preview-label');

  /* ── 목록 렌더링 ── */
  GUIDES.forEach((guide, idx) => {
    const li = document.createElement('li');
    li.className = 'card-item';
    li.dataset.idx = idx;

    li.innerHTML = `
      <div class="card-title">
        <span class="badge">${String(idx + 1).padStart(2,'0')}</span>
        ${guide.title}
      </div>
      <div class="card-actions">
        <button class="btn btn-inline" onclick="showInline(${idx})">
          <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7"/>
          </svg>
          페이지 내 표시
        </button>
        <button class="btn btn-new" onclick="showNewTab(${idx})">
          <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4
                 M14 4h6m0 0v6m0-6L10 14"/>
          </svg>
          새 탭 열기
        </button>
      </div>
    `;
    cardList.appendChild(li);
  });

  /* ── 인라인 표시 ── */
  function showInline(idx) {
    const guide = GUIDES[idx];
    const src   = IMG_DIR + guide.file;

    /* 활성 카드 표시 */
    document.querySelectorAll('.card-item').forEach((el, i) => {
      el.classList.toggle('active', i === idx);
    });

    previewLabel.textContent = guide.title;
    previewImg.src  = src;
    previewImg.alt  = guide.title;

    emptyState.style.display   = 'none';
    previewWrap.style.display  = 'block';

    /* 모바일: 미리보기 영역으로 부드럽게 스크롤 */
    previewWrap.closest('.preview-panel')
      .scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  /* ── 새 탭 열기 ── */
  function showNewTab(idx) {
    window.open(IMG_DIR + GUIDES[idx].file, '_blank');
  }
</script>
</body>
</html>
